<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soirée</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0f0f0f;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Georgia, serif;

    .container {
      text-align: center;
      padding: 2rem;

    img {
      max-width: 90vw;
      max-height: 80vh;
      border-radius: 4px;
      display: block;
      margin: 0 auto;
    }

    p {
      margin-top: 1.2rem;
      color: #888;
      font-size: 14px;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- CHANGE L'IMAGE ICI : remplace le src par le nom de ton fichier image -->

</html>
